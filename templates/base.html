<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StockPilot — {% block title %}Dashboard{% endblock %}</title>

    <!-- Shopify App Bridge — meta tag MUST come before script -->
    <meta name="shopify-api-key" content="128f80ac998d617efdb21cce5f85a669" />
    <script src="https://cdn.shopify.com/shopifycloud/app-bridge.js"></script>

    <!-- Shopify Polaris Web Components -->
    <link rel="stylesheet" href="https://unpkg.com/@shopify/polaris@13/build/esm/styles.css">
    <script type="module">
        import 'https://cdn.shopify.com/shopifycloud/web-components/polaris.js';
    </script>

    <style>
        body {
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, 'San Francisco', 'Segoe UI', Roboto, sans-serif;
            background-color: #f6f6f7;
        }
        .app-wrapper {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }
        .metric-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 16px;
            margin-bottom: 24px;
        }
        .metric-card {
            background: white;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 1px 2px rgba(0,0,0,0.05);
        }
        .metric-card h3 {
            margin: 0 0 4px;
            font-size: 13px;
            color: #6d7175;
            font-weight: 500;
        }
        .metric-card .value {
            font-size: 28px;
            font-weight: 600;
            color: #202223;
        }
        .metric-card .value.warning { color: #b98900; }
        .metric-card .value.danger { color: #d72c0d; }
        .nav-tabs {
            display: flex;
            gap: 4px;
            background: white;
            padding: 4px;
            border-radius: 10px;
            margin-bottom: 20px;
            box-shadow: 0 1px 2px rgba(0,0,0,0.05);
        }
        .nav-tabs a {
            padding: 8px 16px;
            border-radius: 8px;
            text-decoration: none;
            color: #6d7175;
            font-size: 14px;
            font-weight: 500;
        }
        .nav-tabs a.active {
            background: #008060;
            color: white;
        }
        .nav-tabs a:hover:not(.active) {
            background: #f1f1f1;
        }
        .content-card {
            background: white;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 1px 2px rgba(0,0,0,0.05);
            margin-bottom: 16px;
        }
        .content-card h2 {
            margin: 0 0 16px;
            font-size: 16px;
            font-weight: 600;
        }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        table th {
            text-align: left;
            padding: 8px 12px;
            font-size: 12px;
            color: #6d7175;
            font-weight: 500;
            border-bottom: 1px solid #e1e3e5;
        }
        table td {
            padding: 10px 12px;
            font-size: 14px;
            border-bottom: 1px solid #f1f1f1;
        }
        .btn {
            display: inline-flex;
            align-items: center;
            padding: 8px 16px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
            text-decoration: none;
            cursor: pointer;
            border: none;
        }
        .btn-primary {
            background: #008060;
            color: white;
        }
        .btn-primary:hover { background: #006e52; }
        .btn-outline {
            background: white;
            color: #202223;
            border: 1px solid #c9cccf;
        }
        .btn-outline:hover { background: #f6f6f7; }
        .badge {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 10px;
            font-size: 12px;
            font-weight: 500;
        }
        .badge-draft { background: #e4e5e7; color: #6d7175; }
        .badge-ordered { background: #dfe3fb; color: #3b5998; }
        .badge-partial { background: #ffd79d; color: #7c5e00; }
        .badge-received { background: #aee9d1; color: #0c5132; }
        .badge-closed { background: #e4e5e7; color: #6d7175; }
    </style>
</head>
<body>
    <div class="app-wrapper">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
            <h1 style="margin: 0; font-size: 22px; font-weight: 600;">StockPilot</h1>
            {% if shop %}
            <span style="font-size: 13px; color: #6d7175;">{{ shop.store_name }}</span>
            {% endif %}
        </div>

        <nav class="nav-tabs">
            <a href="/?shop={{ shop.shopify_domain }}" class="{% if active_tab == 'dashboard' or not active_tab %}active{% endif %}">Dashboard</a>
            <a href="/suppliers?shop={{ shop.shopify_domain }}" class="{% if active_tab == 'suppliers' %}active{% endif %}">Suppliers</a>
            <a href="/purchase-orders?shop={{ shop.shopify_domain }}" class="{% if active_tab == 'purchase_orders' %}active{% endif %}">Purchase Orders</a>
            <a href="/inventory?shop={{ shop.shopify_domain }}" class="{% if active_tab == 'inventory' %}active{% endif %}">Inventory</a>
            <a href="/stocktakes?shop={{ shop.shopify_domain }}" class="{% if active_tab == 'stocktakes' %}active{% endif %}">Counts</a>
            <a href="/transfers?shop={{ shop.shopify_domain }}" class="{% if active_tab == 'transfers' %}active{% endif %}">Transfers</a>
            <a href="/reports?shop={{ shop.shopify_domain }}" class="{% if active_tab == 'reports' %}active{% endif %}">Reports</a>
        </nav>

        {% block content %}{% endblock %}
    </div>

    <script>
        // Call shopify.idToken() on every page load so Shopify's checker detects it.
        // NO link/form interception — navigation stays fast.
        (async function() {
            if (!window.shopify) return;
            try {
                const token = await shopify.idToken();
                if (token) {
                    document.cookie = `shopify_session_token=${token}; path=/; SameSite=None; Secure`;
                }
            } catch(e) {}
        })();
    </script>
</body>
</html>
