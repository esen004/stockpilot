<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StockPilot — Install</title>
    <meta name="shopify-api-key" content="{{ SHOPIFY_API_KEY }}" />
    <script src="https://cdn.shopify.com/shopifycloud/app-bridge.js"></script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; margin: 0; padding: 60px 20px; background: #f6f6f7; color: #202223; }
        .wrap { max-width: 480px; margin: 0 auto; background: white; padding: 32px; border-radius: 12px; box-shadow: 0 1px 2px rgba(0,0,0,0.05); text-align: center; }
        h1 { margin: 0 0 12px; font-size: 22px; font-weight: 600; }
        p { margin: 0 0 20px; color: #6d7175; font-size: 14px; line-height: 1.5; }
        form { display: flex; gap: 8px; }
        input[type="text"] { flex: 1; padding: 10px 12px; border: 1px solid #c9cccf; border-radius: 8px; font-size: 14px; }
        button { padding: 10px 20px; background: #008060; color: white; border: none; border-radius: 8px; font-size: 14px; font-weight: 500; cursor: pointer; }
        button:hover { background: #006e52; }
        small { display: block; margin-top: 16px; color: #8c9196; font-size: 12px; }
    </style>
</head>
<body>
    <div class="wrap">
        <h1>Install StockPilot</h1>
        <p>StockPilot must be installed from your Shopify admin. Enter your store domain to begin.</p>
        <form method="GET" action="/auth/install">
            <input type="text" name="shop" placeholder="your-store.myshopify.com" pattern=".+\.myshopify\.com" required>
            <button type="submit">Install</button>
        </form>
        <small>Or open the app from <strong>Apps → StockPilot</strong> inside your Shopify admin.</small>
    </div>
</body>
</html>
