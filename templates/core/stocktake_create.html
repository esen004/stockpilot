{% extends "base.html" %}
{% block title %}New Inventory Count{% endblock %}
{% block content %}
<div class="content-card" style="max-width: 500px;">
    <h2>Start Inventory Count</h2>
    <form method="post">
        {% csrf_token %}
        <div style="display: flex; flex-direction: column; gap: 12px;">
            <label>
                <span style="font-size: 13px; font-weight: 500; color: #6d7175;">Count Name</span>
                <input type="text" name="name" placeholder="e.g. Monthly Full Count" style="width: 100%; padding: 8px 12px; border: 1px solid #c9cccf; border-radius: 8px; font-size: 14px;">
            </label>
            <label>
                <span style="font-size: 13px; font-weight: 500; color: #6d7175;">Location *</span>
                <select name="location" required style="width: 100%; padding: 8px 12px; border: 1px solid #c9cccf; border-radius: 8px;">
                    {% for l in locations %}<option value="{{ l.id }}">{{ l.name }}</option>{% endfor %}
                </select>
            </label>
            <label>
                <span style="font-size: 13px; font-weight: 500; color: #6d7175;">Scope</span>
                <select name="scope" style="width: 100%; padding: 8px 12px; border: 1px solid #c9cccf; border-radius: 8px;">
                    <option value="all">All products</option>
                    <option value="stocked">Only products with stock</option>
                </select>
            </label>
            <button type="submit" class="btn btn-primary" style="margin-top: 8px;">Start Counting</button>
        </div>
    </form>
</div>
{% endblock %}
