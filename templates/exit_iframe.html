<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redirecting…</title>
    <meta name="shopify-api-key" content="{{ SHOPIFY_API_KEY }}" />
    <script src="https://cdn.shopify.com/shopifycloud/app-bridge.js"></script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; padding: 40px; color: #6d7175; text-align: center; }
    </style>
</head>
<body>
    <p>Redirecting to Shopify…</p>

    <a id="manualRedirect" href="{{ redirect_url|escape }}" target="_top" style="display:none;">Continue</a>

    <script>
    (function() {
        var target = "{{ redirect_url|escapejs }}";
        // Resolve relative URLs against THIS frame's origin (our app), not the
        // top frame's origin (admin.shopify.com).
        if (target && target.charAt(0) === "/") {
            target = window.location.origin + target;
        }

        // Modern App Bridge intercepts open(url, '_top') and properly breaks out
        // of the admin iframe — window.top.location.href gets sandboxed by
        // Shopify admin's Cross-Origin-Opener-Policy and stays inside the iframe.
        function goAppBridge() {
            try {
                if (typeof open === "function") {
                    var w = open(target, "_top");
                    return true;
                }
            } catch (e) { /* fall through */ }
            return false;
        }
        function goTopLocation() {
            try {
                if (window.top && window.top !== window.self) {
                    window.top.location.href = target;
                    return true;
                }
                window.location.href = target;
                return true;
            } catch (e) { return false; }
        }
        function goAnchorClick() {
            // Last resort: synthesize a click on a <a target="_top"> — App Bridge
            // intercepts these clicks even when programmatic top.location is blocked.
            try {
                var a = document.getElementById("manualRedirect");
                if (a) { a.click(); return true; }
            } catch (e) {}
            return false;
        }

        // Try anchor click first (most reliable inside admin), then App Bridge
        // open(), then raw top.location. Anchor synthesis is the documented
        // Shopify pattern for iframe-breakout.
        if (!goAnchorClick()) {
            if (!goAppBridge()) {
                goTopLocation();
            }
        }
    })();
    </script>
    <noscript>
        <p>JavaScript is required. <a href="{{ redirect_url|escape }}" target="_top">Click here to continue</a>.</p>
    </noscript>
</body>
</html>
